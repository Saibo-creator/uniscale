# Configuration for training language models with Scaling Law
# Following Chinchilla scaling: 20 tokens per parameter

# Data source (parquet sub-directories)
data_dir: "data/tokenizer_training_dataset"
# First eval_docs documents from the interleaved stream are held out for eval.
# After chunking (~40-60% yield), 3000 docs ≈ 1200-1800 eval samples.
eval_docs: 3000

# Model sizes to train
# Start with smaller models for faster experimentation
model_sizes:
  - "30M"   # 50M params → 1B tokens
  - "100M"  # 100M params → 2B tokens
  - "300M"  # 300M params → 6B tokens (uncomment when ready)
  # - "1B"    # 1B params → 20B tokens (uncomment when ready)

# Tokenizers to use - start with 2 for comparison
tokenizers:
  - "out/tokenizers/bpe_apertus_128k"
  - "out/tokenizers/bpe_byte_level_128k"
  - "out/tokenizers/bpe_gpt2_128k"
  - "out/tokenizers/superbpe_apertus_128k"
  - "out/tokenizers/unigram_apertus_128k"
  - "out/tokenizers/unigram_byte_level_128k"
  - "out/tokenizers/unigram_gpt2_128k"

# Random seeds for multiple runs (3 seeds for statistical significance)
seeds:
  - 42
  - 43
  - 44

# Training hyperparameters
training:
  # Token-based training (NOT epoch-based), following Chinchilla scaling law.
  #
  # max_steps is derived at runtime:
  #   param_count  = estimate_parameters_for_size(model_size, tokenizer_vocab_size)
  #   total_tokens = tokens_per_param × param_count
  #   max_steps    = total_tokens / tokens_per_step
  #
  # tokens_per_step = per_device_batch × max_length × grad_accum × num_gpus
  #   e.g. 8 × 2048 × 4 × 4 GPUs = 262,144 tokens/step (256K)

  # Chinchilla ratio: train on this many tokens per model parameter.
  tokens_per_param: 20

  # Batch configuration (optimized for 256K tokens/step with efficiency)
  per_device_train_batch_size: 2   # 8 samples per GPU
  per_device_eval_batch_size: 16   # Can use larger batch for eval
  tokens_per_step: 262144          # 256K tokens/step (primary knob)
  # gradient_accumulation_steps is auto-derived at launch time:
  #   grad_accum = tokens_per_step / (per_device_batch × max_length × num_gpus)
  #   e.g. 262144 / (8 × 2048 × 4 GPUs) = 4

  # Optimization
  learning_rate: 5.0e-4
  weight_decay: 0.1
  max_grad_norm: 1.0

  # Learning rate schedule
  lr_scheduler_type: "cosine"
  warmup_ratio: 0.01  # 1% of training for warmup

  # Sequence length
  max_length: 2048

  # Mixed precision training
  # Using FP32 (full precision) for stability
  bf16: true  # bfloat16 requires Ampere+ (RTX 3000 series or newer)
  fp16: false  # Use FP32 for maximum stability

  # Checkpointing
  save_strategy: "steps"
  save_steps: 100  # Save every 100 steps
  save_total_limit: 3  # Keep only last 3 checkpoints to save space

  # Evaluation
  evaluation_strategy: "steps"
  eval_steps: 100  # Eval every 100 steps

  # Logging
  logging_steps: 10
  logging_first_step: true

  # Performance
  dataloader_num_workers: 1  # streaming IterableDataset: capped at num_shards anyway
  remove_unused_columns: false

# Output directory structure
# out/experiments/{model_size}_{tokenizer_name}_seed{seed}/
output_dir: "out/experiments"

# Experiment tracking
wandb:
  enabled: true
  project: "uniscale"
  entity: null  # Set to your W&B username/team
  tags:
    - "scaling-law"
    - "fineweb2"
    - "20-tokens-per-param"

# Hardware configuration
# Adjust based on your GPU memory
hardware:
  gradient_checkpointing: false  # Enable for larger models if OOM
  use_cpu: false